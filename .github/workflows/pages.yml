name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: /ReSol
          NEXT_PUBLIC_SOLANA_CLUSTER: ${{ vars.NEXT_PUBLIC_SOLANA_CLUSTER || 'devnet' }}
          NEXT_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_RPC_URL || 'https://api.devnet.solana.com' }}
          NEXT_PUBLIC_PROGRAM_ID: ${{ vars.NEXT_PUBLIC_PROGRAM_ID || 'BJbjgczJvjSb4GXPcjDWLPUQdfKRe7SFPCXQqZLcsrBw' }}
          NEXT_PUBLIC_USDC_MINT: ${{ vars.NEXT_PUBLIC_USDC_MINT || 'B3rGdGRvZjkP1N2BJiRqyeQAm9sCeeP1vbkwzQcWSnSD' }}
          NEXT_PUBLIC_TREASURY: ${{ vars.NEXT_PUBLIC_TREASURY || 'FvSfLTD5HQGCJa89WP3UzMFrBM12vavjKdvH4iQeizBb' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'http://127.0.0.1:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'resol-placeholder-anon-key' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
